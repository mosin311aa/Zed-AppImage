name: Build Release AppImage
on:
  workflow_dispatch:
  schedule:
    - cron: "5 */12 * * *"
  push:
    branches:
      - "main"

jobs:
  build:
    name: Zed Release AppImage
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      needs_build: ${{ steps.check_update.outputs.NEEDS_BUILD }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version info
        id: get_version
        run: |
          set -euo pipefail
          # Get prerelease tag + date
          ALL_RELEASES=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/zed-industries/zed/releases")
          TAG=$(echo "$ALL_RELEASES" | jq -r 'map(select(.prerelease)) | first | .tag_name')
          DATE=$(echo "$ALL_RELEASES" | jq -r 'map(select(.prerelease)) | first | .published_at')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No pre-release found"
            exit 1
          fi
          VERSION=$(echo "$TAG" | sed 's/^v//')
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "DATE_EPOCH=$(date -d "$DATE" +%s 2>/dev/null || date -d '2020-01-01' +%s)" >> $GITHUB_OUTPUT

          # Try to get the direct browser_download_url for the linux x86_64 tarball from the release by tag.
          RELEASE_BY_TAG=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/zed-industries/zed/releases/tags/${TAG}")
          DOWNLOAD_URL=$(echo "$RELEASE_BY_TAG" | jq -r '.assets[]? | select(.name=="zed-linux-x86_64.tar.gz") | .browser_download_url')
          # Fallback: search the ALL_RELEASES list for the first matching asset
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            DOWNLOAD_URL=$(echo "$ALL_RELEASES" | jq -r '.[].assets[]? | select(.name=="zed-linux-x86_64.tar.gz") | .browser_download_url' | head -n1)
          fi
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "WARNING: could not determine download URL for zed-linux-x86_64.tar.gz (tag: ${TAG})" >&2
            # Still export empty so downstream step can handle it and fail with clearer message
            echo "DOWNLOAD_URL=" >> $GITHUB_OUTPUT
          else
            echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing release
        id: check_update
        run: |
          set -euo pipefail
          # Query the GitHub API for the 'latest' release and inspect its body for our version marker
          LATEST=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          if echo "$LATEST" | jq -e . >/dev/null 2>&1; then
            EXISTING=$(echo "$LATEST" | jq -r '.body' | grep -oP 'Zed version: \K[0-9.-]+' || echo "none")
            if [ "$EXISTING" = "${{ steps.get_version.outputs.VERSION }}" ]; then
              echo "NEEDS_BUILD=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "NEEDS_BUILD=true" >> $GITHUB_OUTPUT
          echo "APP_NAME=Zed" >> $GITHUB_ENV
          echo "APP_VERSION=${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_ENV

      - name: Install dependencies
        if: steps.check_update.outputs.NEEDS_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools libfuse3-3 wget jq curl gh


      - name: Download & prepare Zed with retry and validation
        if: steps.check_update.outputs.NEEDS_BUILD == 'true'
        env:
          TZ: UTC
          SOURCE_DATE_EPOCH: ${{ steps.get_version.outputs.DATE_EPOCH }}
        run: |
          set -euo pipefail
          TAG="${{ steps.get_version.outputs.TAG }}"
          DOWNLOAD_URL="${{ steps.get_version.outputs.DOWNLOAD_URL }}"

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "No DOWNLOAD_URL available for tag ${TAG}; cannot download zed-linux-x86_64.tar.gz"
            exit 1
          fi
          echo "Using DOWNLOAD_URL: $DOWNLOAD_URL"

          # Download with retries and follow redirects
          for i in 1 2 3; do
            if curl -L --fail -o zed-linux-x86_64.tar.gz "$DOWNLOAD_URL"; then
              echo "Downloaded archive"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "Failed to download after 3 attempts"
              exit 1
            fi
            sleep 5
          done

          # Verify download
          if [ ! -f zed-linux-x86_64.tar.gz ]; then
            echo "Download failed - archive not found"
            exit 1
          fi
          echo "Downloaded archive size: $(ls -lah zed-linux-x86_64.tar.gz | awk '{print $5}')"

          tar -xzf zed-linux-x86_64.tar.gz --mtime='2020-01-01 00:00:00'
          # adapt if layout varies
          if [ -d "zed-preview.app" ]; then
            mv zed-preview.app AppDir
          elif [ -d "AppDir" ]; then
            echo "AppDir already present"
          else
            # try to find unpacked directory
            DIR=$(tar -tzf zed-linux-x86_64.tar.gz | head -n1 | cut -f1 -d"/")
            if [ -d "$DIR" ]; then
              mv "$DIR" AppDir
            else
              echo "Could not locate unpacked AppDir"
              exit 1
            fi
          fi
          rm -f zed-linux-x86_64.tar.gz

          echo "AppDir structure (desktop files):"
          find AppDir -name "*.desktop" -type f

          DESKTOP_FILE=$(find AppDir -name "*.desktop" -type f | head -n 1)
          if [ -z "$DESKTOP_FILE" ]; then
            echo "ERROR: No desktop file found in AppDir"
            exit 1
          fi
          echo "Found desktop file: $DESKTOP_FILE"

          cp "$DESKTOP_FILE" AppDir/zed.desktop
          sed -i 's/Name=zed-preview/Name=Zed/' AppDir/zed.desktop
          sed -i 's/Exec=zed-preview/Exec=zed/' AppDir/zed.desktop

          ICON_FILE=$(find AppDir -name "zed*.png" -type f | head -n 1)
          if [ -n "$ICON_FILE" ]; then
            cp "$ICON_FILE" AppDir/zed.png
            echo "Copied icon: $ICON_FILE"
          fi

          # ensure AppRun points to binary
          cd AppDir && ln -sf bin/zed AppRun && cd ..
          # normalize timestamps for reproducible builds
          find AppDir -type f -o -type d | sort | xargs touch -t 202001010000.00

          echo "Final AppDir top-level:"
          ls -la AppDir/

      - name: Build AppImage
        id: build_appimage
        if: steps.check_update.outputs.NEEDS_BUILD == 'true'
        env:
          VERSION: ${{ env.APP_VERSION }}
        run: |
          set -euo pipefail
          echo "Building AppImage with VERSION=$VERSION"
          
          wget -q https://github.com/probonopd/go-appimage/releases/download/continuous/appimagetool-940-x86_64.AppImage -O appimagetool.AppImage
          chmod +x appimagetool.AppImage
          
          OUTPUT_FILE="Zed_Preview-${VERSION}-x86_64.AppImage"
          
          echo "Running appimagetool..."
          if ./appimagetool.AppImage -v ./AppDir "$OUTPUT_FILE"; then
            echo "✓ AppImage built successfully"
          else
            RESULT=$?
            echo "✗ appimagetool failed with exit code: $RESULT"
            exit 1
          fi
          
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "ERROR: Output file not created: $OUTPUT_FILE"
            ls -la *.AppImage 2>/dev/null || echo "No AppImage files found"
            exit 1
          fi
          
          echo "APPIMAGE_FILE=$OUTPUT_FILE" >> $GITHUB_OUTPUT
          echo "Generated: $OUTPUT_FILE ($(ls -lh "$OUTPUT_FILE" | awk '{print $5}'))"

      - name: Verify and validate AppImage
        if: steps.check_update.outputs.NEEDS_BUILD == 'true'
        run: |
          set -euo pipefail
          APPIMAGE_FILE="${{ steps.build_appimage.outputs.APPIMAGE_FILE }}"
          test -n "$APPIMAGE_FILE" || (echo "AppImage missing" && exit 1)
          test -f "$APPIMAGE_FILE" || (echo "AppImage missing" && exit 1)
          echo "APPIMAGE_FILE=$APPIMAGE_FILE" >> $GITHUB_ENV
          chmod +x "$APPIMAGE_FILE"
          echo "AppImage: $APPIMAGE_FILE"
          echo "AppImage size: $(ls -lah "$APPIMAGE_FILE" | awk '{print $5}')"

      - name: Upload release (gh)
        if: steps.check_update.outputs.NEEDS_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APPIMAGE_FILE="${APPIMAGE_FILE:-${{ env.APPIMAGE_FILE }}}"
          FILES="$APPIMAGE_FILE"
          ZSYNC_FILE="${APPIMAGE_FILE}.zsync"
          [ -f "$ZSYNC_FILE" ] && FILES="$FILES $ZSYNC_FILE"

          for file in $FILES; do
            if [ ! -f "$file" ]; then
              echo "File $file does not exist for upload"
              exit 1
            fi
          done

          echo "Files to upload: $FILES"

          for i in 1 2 3; do
            if gh release delete latest --yes 2>/dev/null; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "Failed to delete existing release after 3 attempts (continuing to create new)"
            fi
            sleep 2
          done

          for i in 1 2 3; do
            if gh release create latest \
              --title "Zed AppImage ${{ env.APP_VERSION }}" \
              --notes "Zed version: ${{ env.APP_VERSION }}" \
              -- $FILES; then
              echo "Release created"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "Failed to create release after 3 attempts"
              exit 1
            fi
            sleep 2
          done

      - name: Post-release debug
        if: steps.check_update.outputs.NEEDS_BUILD == 'true'
        run: |
          echo "Final files:"
          ls -la Zed_Preview-*.* 2>/dev/null || ls -la Zed-*.* 2>/dev/null
          echo "Post-release debug complete."
